<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD SPEED LAB: DISPLACE TOOL V3.0 (DATA INTEGRATED)</title>
    <style>
        /* GitHub BWG 极简黑白灰配色 */
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-muted: #8b949e;
            --main-color: #ffffff; 
            --accent-color: #58a6ff;
            --accent-green: #238636;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 2rem;
            margin-top: 0;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
            width: 100%;
            max-width: 1100px;
            color: var(--main-color);
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }
        .canvas-container {
            border: 1px solid var(--border-color);
            background-color: #000; /* 画布底色固定为黑 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 450px;
            position: relative;
            cursor: crosshair;
        }
        canvas {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            user-select: none; 
            -webkit-user-drag: none;
            image-rendering: pixelated; 
        }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }
        h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 600;
        }
        input[type="file"] {
            font-size: 12px;
            color: var(--text-muted);
            width: 100%;
            margin-top: 5px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        button {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        button.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background-color: rgba(88, 166, 255, 0.1);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin-top: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: var(--main-color);
            cursor: pointer;
            margin-top: -5px;
            border: 1px solid var(--border-color);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-top: auto;
            padding-top: 15px;
        }
        .export-btn {
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: bold;
            padding: 12px;
            margin-top: auto;
            width: 100%;
        }
        .export-btn:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <h1>Displace_Lab / v3.0.0_DATA_EDITION</h1>

    <div class="container">
        <div class="canvas-container" id="drop-zone">
            <canvas id="display-canvas" width="800" height="450"></canvas>
        </div>

        <div class="controls">
            <div class="panel">
                <h3>[1] DATA SOURCE (数据源)</h3>
                <p style="font-size: 11px; color: var(--text-muted); margin-top:0;">系统已内置提取的游戏数据，点击切换渲染排版。</p>
                <div class="btn-group" style="grid-template-columns: 1fr;">
                    <button class="data-btn active" data-type="phantom">PHANTOM 战术规范 (Spec)</button>
                    <button class="data-btn" data-type="superfly">SUPERFLY 排行榜 (List)</button>
                    <button class="data-btn" data-type="split">SPLIT 分段计时 (Time)</button>
                </div>

                <label style="margin-top: 25px; border-top: 1px dashed var(--border-color); padding-top: 15px;">或上传自定义底图覆盖 (Base Image)</label>
                <input type="file" id="base-upload" accept="image/*">
            </div>

            <div class="panel">
                <h3>[2] GLITCH MAP (故障材质)</h3>
                <label>内置程序化材质 (Procedural)</label>
                <div class="btn-group">
                    <button class="preset-btn active" data-type="h-bars">水平扫描线 (H-Bars)</button>
                    <button class="preset-btn" data-type="v-bars">垂直扫描线 (V-Bars)</button>
                    <button class="preset-btn" data-type="noise">极客噪点 (Noise)</button>
                    <button class="preset-btn" data-type="strobe">信号频闪 (Strobe)</button>
                    <button class="preset-btn" data-type="shatter">屏幕碎裂 (Shatter)</button>
                    <button class="preset-btn" data-type="broken">显存溢出 (Broken)</button>
                </div>
                
                <label style="margin-top: 25px;">或上传自定义材质 (Displace Map)</label>
                <input type="file" id="map-upload" accept="image/*">
            </div>

            <div class="panel">
                <h3>[3] DISPLACEMENT (扭曲强度)</h3>
                
                <label>水平扭曲强度 X <span id="h-val">30</span></label>
                <input type="range" id="h-scale" min="0" max="300" value="30">

                <label>垂直扭曲强度 Y <span id="v-val">0</span></label>
                <input type="range" id="v-scale" min="0" max="300" value="0">

                <label style="color: var(--accent-color); margin-top: 20px;">全局材质缩放 (Zoom) <span id="map-zoom-val">1.0</span></label>
                <input type="range" id="map-zoom" min="0.1" max="5.0" step="0.1" value="1.0">

                <label class="checkbox-group" style="margin-bottom: 10px;">
                    <input type="checkbox" id="show-map"> 仅预览当前黑白材质 (View Map)
                </label>
                
                <p style="font-size: 11px; color: var(--text-muted); border-top: 1px dashed var(--border-color); padding-top: 10px;">*在画面内拖拽鼠标可框选局部故障区域。</p>

                <button class="export-btn" id="export-btn">EXPORT RAW PIXELS (导出)</button>
            </div>
        </div>
    </div>

    <script>
        const displayCanvas = document.getElementById('display-canvas');
        const ctx = displayCanvas.getContext('2d', { willReadFrequently: true });
        
        const baseCanvas = document.createElement('canvas');
        const baseCtx = baseCanvas.getContext('2d', { willReadFrequently: true });
        const mapCanvas = document.createElement('canvas');
        const mapCtx = mapCanvas.getContext('2d', { willReadFrequently: true });

        // DOM Elements
        const hScaleSlider = document.getElementById('h-scale');
        const vScaleSlider = document.getElementById('v-scale');
        const mapZoomSlider = document.getElementById('map-zoom'); 
        const showMapCheckbox = document.getElementById('show-map');
        
        let currentImgWidth = 800;
        let currentImgHeight = 800; // 调整为方形更适合排版展示
        let isMapDirty = true;
        let hasCustomBase = false; // 标记是否上传了自定义底图

        // 选区变量
        let selectionBox = null; 
        let isSelecting = false;
        let startX, startY;

        // --- 数据渲染逻辑 ---
        function renderDataToCanvas(dataType) {
            hasCustomBase = false; // 切换数据时，清除自定义底图标记
            baseCanvas.width = 800;
            baseCanvas.height = 800;
            currentImgWidth = 800;
            currentImgHeight = 800;

            // 纯黑背景
            baseCtx.fillStyle = '#000000'; 
            baseCtx.fillRect(0, 0, 800, 800);

            // 基础字体设定 (模拟 Univers 和等宽感)
            baseCtx.textBaseline = 'top';
            
            // 绿色调色板 (从你图片里提取的 MAD SPEED 荧光绿)
            const colorGreen = '#8CFF00'; 
            const colorWhite = '#FFFFFF';

            if (dataType === 'phantom') {
                // PHANTOM 战术规范排版
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = 'bold 30px "Courier New"';
                baseCtx.fillText('[NIKE PHANTOM]', 40, 40);
                baseCtx.textAlign = 'right';
                baseCtx.fillText('THE_STRIKE_LAB', 760, 40);
                
                baseCtx.textAlign = 'left';
                baseCtx.scale(1.5, 1); // 模拟拉伸
                
                // 行 1
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = 'bold 24px "Courier New"';
                baseCtx.fillText('STAGE 1', 40/1.5, 150);
                baseCtx.fillStyle = colorGreen;
                baseCtx.font = 'bold 40px sans-serif';
                baseCtx.fillText('从容进攻', 40/1.5, 180);
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = '16px "Courier New"';
                baseCtx.fillText('STAY COMFORTABLE ON THE ATTACK', 40/1.5, 230);

                // 行 2
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = 'bold 24px "Courier New"';
                baseCtx.fillText('STAGE 2', 40/1.5, 350);
                baseCtx.fillStyle = colorGreen;
                baseCtx.font = 'bold 40px sans-serif';
                baseCtx.fillText('突破防线', 40/1.5, 380);
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = '16px "Courier New"';
                baseCtx.fillText('TEAR THROUGH DEFENDERS', 40/1.5, 430);

                // 行 3
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = 'bold 24px "Courier New"';
                baseCtx.fillText('STAGE 3', 40/1.5, 550);
                baseCtx.fillStyle = colorGreen;
                baseCtx.font = 'bold 40px sans-serif';
                baseCtx.fillText('精准打击', 40/1.5, 580);
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = '16px "Courier New"';
                baseCtx.fillText('ATTACK WITH PRECISION', 40/1.5, 630);
                
                baseCtx.setTransform(1, 0, 0, 1, 0, 0); // 重置拉伸

            } else if (dataType === 'superfly') {
                // SUPERFLY 排行榜排版
                baseCtx.fillStyle = colorGreen;
                baseCtx.fillRect(0,0, 800, 800); // 绿底
                
                baseCtx.fillStyle = '#000000'; // 黑字
                baseCtx.font = 'bold 40px "Courier New"';
                baseCtx.scale(1.2, 1);
                
                const data = [
                    ["01", "MARCUS R.", "0645", "38.2KM/H"],
                    ["02", "DAVID T.",  "0620", "37.8KM/H"],
                    ["03", "SARAH W.",  "0595", "36.5KM/H"],
                    ["04", "RYAN H.",   "0580", "35.9KM/H"],
                    ["05", "EMILY S.",  "0570", "34.1KM/H"],
                    ["06", "NOAH P.",   "0560", "33.8KM/H"]
                ];

                let startY = 100;
                data.forEach((row, index) => {
                    baseCtx.fillText(row[0], 50/1.2, startY + index * 80);
                    baseCtx.fillText(row[1], 150/1.2, startY + index * 80);
                    baseCtx.fillText(row[2], 450/1.2, startY + index * 80);
                    baseCtx.fillText(row[3], 600/1.2, startY + index * 80);
                });
                baseCtx.setTransform(1, 0, 0, 1, 0, 0);

            } else if (dataType === 'split') {
                // 分段计时排版 (极粗等宽字体)
                baseCtx.fillStyle = colorGreen;
                baseCtx.fillRect(0,0, 800, 800); // 绿底
                
                baseCtx.fillStyle = colorWhite;
                baseCtx.font = 'bold 100px "Courier New"';
                baseCtx.textAlign = 'center';
                
                const times = ["00:03.23", "00:08.13", "00:13.54", "00:17.43", "00:19.08"];
                let startY = 80;
                times.forEach((time, index) => {
                    baseCtx.fillText(time, 400, startY + index * 140);
                });
                baseCtx.textAlign = 'left'; // reset
            }

            // 重新生成匹配新画布尺寸的材质
            if(isMapDirty || document.querySelector('.preset-btn.active')) {
                generatePresetMap(document.querySelector('.preset-btn.active').dataset.type); 
            }
            render();
        }

        // --- 材质生成逻辑 ---
        function generatePresetMap(type) {
            mapCanvas.width = currentImgWidth;
            mapCanvas.height = currentImgHeight;
            const w = currentImgWidth;
            const h = currentImgHeight;
            
            mapCtx.fillStyle = '#808080';
            mapCtx.fillRect(0, 0, w, h);

            if (type === 'h-bars') {
                for (let y = 0; y < h; y += 15) {
                    mapCtx.fillStyle = Math.random() > 0.5 ? '#FFFFFF' : '#000000';
                    mapCtx.fillRect(0, y, w, Math.random() * 10 + 2);
                }
            } else if (type === 'v-bars') {
                for (let x = 0; x < w; x += 15) {
                    mapCtx.fillStyle = Math.random() > 0.5 ? '#FFFFFF' : '#000000';
                    mapCtx.fillRect(x, 0, Math.random() * 10 + 2, h);
                }
            } else if (type === 'noise') {
                const imgData = mapCtx.createImageData(w, h);
                for (let i = 0; i < imgData.data.length; i += 4) {
                    const val = Math.random() > 0.5 ? 255 : 0;
                    imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = val;
                    imgData.data[i+3] = 255;
                }
                mapCtx.putImageData(imgData, 0, 0);
            } 
            else if (type === 'strobe') {
                for (let y = 0; y < h; y += Math.random() * 50 + 20) {
                    mapCtx.fillStyle = Math.random() > 0.3 ? '#FFFFFF' : '#000000';
                    mapCtx.fillRect(0, y, w, Math.random() * 40 + 10);
                }
            }
            else if (type === 'shatter') {
                for(let i = 0; i < 40; i++) {
                    mapCtx.beginPath();
                    mapCtx.moveTo(Math.random() * w, Math.random() * h);
                    mapCtx.lineTo(Math.random() * w, Math.random() * h);
                    mapCtx.strokeStyle = Math.random() > 0.5 ? '#FFFFFF' : '#000000';
                    mapCtx.lineWidth = Math.random() * 15 + 2;
                    mapCtx.stroke();
                }
            }
            else if (type === 'broken') {
                for(let i=0; i<50; i++) {
                    const grayVal = Math.floor(Math.random() * 255);
                    mapCtx.fillStyle = `rgb(${grayVal},${grayVal},${grayVal})`;
                    const bw = Math.random() * 100 + 20;
                    const bh = Math.random() * 100 + 20;
                    mapCtx.fillRect(Math.random()*w, Math.random()*h, bw, bh);
                }
            }
            isMapDirty = false;
        }

        // --- 核心置换逻辑 ---
        function applyDisplacement(targetCanvas) {
            const w = currentImgWidth;
            const h = currentImgHeight;
            targetCanvas.width = w;
            targetCanvas.height = h;
            const targetCtx = targetCanvas.getContext('2d');
            targetCtx.imageSmoothingEnabled = false; 

            const hScale = parseInt(hScaleSlider.value);
            const vScale = parseInt(vScaleSlider.value);
            const zoom = parseFloat(mapZoomSlider.value);

            if (hScale === 0 && vScale === 0 && !selectionBox && !showMapCheckbox.checked) {
                targetCtx.drawImage(baseCanvas, 0, 0);
                return;
            }

            const baseData = baseCtx.getImageData(0, 0, w, h);
            const mapData = mapCtx.getImageData(0, 0, w, h);
            const resultData = targetCtx.createImageData(w, h);

            const bArr = baseData.data;
            const mArr = mapData.data;
            const rArr = resultData.data;

            const cx = w / 2;
            const cy = h / 2;
            const finalScaleX = zoom; // 简化拉伸，只用全局 Zoom
            const finalScaleY = zoom;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const i = (y * w + x) * 4;

                    if (showMapCheckbox.checked) {
                        let mapX = Math.floor((x - cx) / finalScaleX + cx);
                        let mapY = Math.floor((y - cy) / finalScaleY + cy);
                        mapX = ((mapX % w) + w) % w;
                        mapY = ((mapY % h) + h) % h;
                        
                        const mapI = (mapY * w + mapX) * 4;
                        rArr[i] = mArr[mapI]; rArr[i+1] = mArr[mapI+1];
                        rArr[i+2] = mArr[mapI+2]; rArr[i+3] = 255;
                        continue;
                    }

                    let inSelection = true;
                    if (selectionBox) {
                        inSelection = (x >= selectionBox.x && x <= selectionBox.x + selectionBox.w &&
                                       y >= selectionBox.y && y <= selectionBox.y + selectionBox.h);
                    }

                    if (!inSelection) {
                        rArr[i] = bArr[i]; rArr[i+1] = bArr[i+1]; 
                        rArr[i+2] = bArr[i+2]; rArr[i+3] = bArr[i+3];
                        continue;
                    }

                    let mapX = Math.floor((x - cx) / finalScaleX + cx);
                    let mapY = Math.floor((y - cy) / finalScaleY + cy);
                    mapX = ((mapX % w) + w) % w;
                    mapY = ((mapY % h) + h) % h;

                    const mapI = (mapY * w + mapX) * 4;
                    const gray = mArr[mapI]; 
                    const normalized = (gray - 128) / 128; 

                    const dx = Math.round(normalized * hScale);
                    const dy = Math.round(normalized * vScale);

                    let sx = x - dx;
                    let sy = y - dy;

                    sx = Math.max(0, Math.min(w - 1, sx));
                    sy = Math.max(0, Math.min(h - 1, sy));

                    const srcI = (sy * w + sx) * 4;

                    rArr[i] = bArr[srcI];
                    rArr[i+1] = bArr[srcI+1];
                    rArr[i+2] = bArr[srcI+2];
                    rArr[i+3] = bArr[srcI+3];
                }
            }
            targetCtx.putImageData(resultData, 0, 0);

            if ((selectionBox || isSelecting) && !showMapCheckbox.checked) {
                targetCtx.strokeStyle = 'rgba(88, 166, 255, 0.8)';
                targetCtx.lineWidth = 2;
                targetCtx.setLineDash([5, 5]);
                let bx = selectionBox ? selectionBox.x : startX;
                let by = selectionBox ? selectionBox.y : startY;
                let bw = selectionBox ? selectionBox.w : 0;
                let bh = selectionBox ? selectionBox.h : 0;
                targetCtx.strokeRect(bx, by, bw, bh);
                targetCtx.setLineDash([]); 
            }
        }

        function render() {
            displayCanvas.width = currentImgWidth;
            displayCanvas.height = currentImgHeight;
            applyDisplacement(displayCanvas);
        }

        // --- 鼠标交互绑定 ---
        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        displayCanvas.addEventListener('mousedown', (e) => {
            if(showMapCheckbox.checked) return;
            isSelecting = true;
            const pos = getMousePos(displayCanvas, e);
            startX = pos.x;
            startY = pos.y;
            selectionBox = { x: startX, y: startY, w: 0, h: 0 };
        });

        displayCanvas.addEventListener('mousemove', (e) => {
            if (!isSelecting) return;
            const pos = getMousePos(displayCanvas, e);
            selectionBox.w = pos.x - startX;
            selectionBox.h = pos.y - startY;
            render();
        });

        window.addEventListener('mouseup', () => {
            if (isSelecting) {
                isSelecting = false;
                if (selectionBox) {
                    if (selectionBox.w < 0) { selectionBox.x += selectionBox.w; selectionBox.w = Math.abs(selectionBox.w); }
                    if (selectionBox.h < 0) { selectionBox.y += selectionBox.h; selectionBox.h = Math.abs(selectionBox.h); }
                    if (selectionBox.w < 5 && selectionBox.h < 5) selectionBox = null;
                }
                render();
            }
        });

        // 取消了专门的清除按钮，双击画布清除选区更极客
        displayCanvas.addEventListener('dblclick', () => {
            selectionBox = null;
            render();
        });

        // --- 按钮与滑块控制 ---
        document.querySelectorAll('.data-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.data-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderDataToCanvas(e.target.dataset.type);
            });
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                generatePresetMap(e.target.dataset.type);
                render();
            });
        });

        [hScaleSlider, vScaleSlider, mapZoomSlider].forEach(slider => {
            slider.addEventListener('input', (e) => {
                document.getElementById(e.target.id.replace('scale', 'val').replace('zoom', 'zoom-val')).innerText = e.target.value;
                render();
            });
        });

        showMapCheckbox.addEventListener('change', render);

        // --- 文件上传逻辑 ---
        function handleImageUpload(e, targetCtx, isBase) {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            img.onload = () => {
                if (isBase) {
                    hasCustomBase = true;
                    // 上传底图时，清除数据按钮的激活状态
                    document.querySelectorAll('.data-btn').forEach(b => b.classList.remove('active'));
                    currentImgWidth = img.width;
                    currentImgHeight = img.height;
                    baseCanvas.width = img.width;
                    baseCanvas.height = img.height;
                    baseCtx.drawImage(img, 0, 0);
                    if(isMapDirty) generatePresetMap(document.querySelector('.preset-btn.active').dataset.type); 
                } else {
                    mapCanvas.width = currentImgWidth;
                    mapCanvas.height = currentImgHeight;
                    mapCtx.drawImage(img, 0, 0, currentImgWidth, currentImgHeight);
                    isMapDirty = false;
                }
                render();
            };
            img.src = URL.createObjectURL(file);
        }

        document.getElementById('base-upload').addEventListener('change', (e) => handleImageUpload(e, baseCtx, true));
        document.getElementById('map-upload').addEventListener('change', (e) => handleImageUpload(e, mapCtx, false));

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-color)'; });
        dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border-color)');
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border-color)';
            if (e.dataTransfer.files.length) {
                document.getElementById('base-upload').files = e.dataTransfer.files;
                handleImageUpload({target: {files: e.dataTransfer.files}}, baseCtx, true);
            }
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            const tempBox = selectionBox;
            const tempShowMap = showMapCheckbox.checked;
            selectionBox = null; 
            showMapCheckbox.checked = false; 
            
            const exportCanvas = document.createElement('canvas');
            applyDisplacement(exportCanvas);
            const link = document.createElement('a');
            link.download = `MAD_SPEED_DATA_GLITCH_${Date.now()}.png`;
            link.href = exportCanvas.toDataURL('image/png');
            link.click();
            
            selectionBox = tempBox; 
            showMapCheckbox.checked = tempShowMap;
            render();
        });

        // 页面加载默认渲染第一项数据
        renderDataToCanvas('phantom');
    </script>
</body>
</html>
